<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROGUE animated">
<rect width="512" height="512" rx="112" fill="#0a0e0c"/>
<g transform="translate(76 76) scale(0.703)">  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3dffab"/><stop offset="1" stop-color="#00d472"/></linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#163d2b"/><stop offset="1" stop-color="#0a1f16"/></linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff4f6c"/><stop offset="1" stop-color="#ff003c"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDev="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="rglow" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDev="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="428" cy="282" r="80" fill="none" stroke="#ff003c" stroke-width="6" opacity="0.34">
    <animate attributeName="r" values="80;200" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="2.2s" repeatCount="indefinite"/></circle>
  <rect x="76" y="76" width="120" height="120" rx="26" fill="url(#gd)"/><rect x="368" y="76" width="120" height="120" rx="26" fill="url(#gd)"/>
  <rect x="76" y="222" width="120" height="120" rx="26" fill="url(#gd)"/><rect x="222" y="368" width="120" height="120" rx="26" fill="url(#gd)"/>
  <rect x="368" y="368" width="120" height="120" rx="26" fill="url(#gd)"/>
  <g filter="url(#glow)">
    <rect x="222" y="76" width="120" height="120" rx="26" fill="url(#g)"><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="222" y="222" width="120" height="120" rx="26" fill="url(#g)"><animate attributeName="opacity" values="0.8;1;0.8" dur="3s" begin="0.6s" repeatCount="indefinite"/></rect>
    <rect x="76" y="368" width="120" height="120" rx="26" fill="url(#g)"><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.2s" repeatCount="indefinite"/></rect>
  </g>
  <g filter="url(#rglow)"><rect x="368" y="222" width="120" height="120" rx="26" fill="url(#r)"><animate attributeName="opacity" values="0.75;1;0.75" dur="2.2s" repeatCount="indefinite"/></rect></g></g></svg>
