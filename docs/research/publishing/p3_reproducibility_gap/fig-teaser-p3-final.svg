<svg viewBox="0 0 1040 400" xmlns="http://www.w3.org/2000/svg" font-family="'Times New Roman', Times, 'Nimbus Roman', Georgia, serif">
  <!-- palette: arXiv blue #2f6df6  grey-lit orange #e0803a  robust red #c2354d  ink #16181d  muted #8a9098  white bg -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8a9098" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===================== TITLE ===================== -->
  <text x="44" y="34" font-size="21" font-weight="bold" fill="#16181d">A claimed success rate does not predict whether a jailbreak still works</text>
  <text x="44" y="55" font-size="13" font-style="italic" fill="#8a9098">Replayed as carrier mechanisms in deployment, under a judge calibrated to under-count, almost all of them collapse.</text>

  <!-- ===================== STAGE 1: claims in ===================== -->
  <rect x="44" y="86" width="214" height="150" rx="7" fill="#ffffff" stroke="#8a9098" stroke-width="0.8"/>
  <text x="151" y="110" font-size="14" font-weight="bold" fill="#16181d" text-anchor="middle">459 open-web techniques</text>
  <text x="151" y="129" font-size="12" fill="#8a9098" text-anchor="middle">harvested with a claim attached</text>
  <text x="151" y="162" font-size="17" fill="#c2354d" text-anchor="middle">&#8220;works 100% of the time&#8221;</text>
  <text x="151" y="186" font-size="17" fill="#c2354d" text-anchor="middle">&#8220;95% bypass&#8221;</text>
  <text x="151" y="218" font-size="11.5" fill="#8a9098" text-anchor="middle">Reddit · GitHub · arXiv · blogs · X</text>

  <line x1="262" y1="161" x2="312" y2="161" stroke="#8a9098" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ===================== STAGE 2: the apparatus (load-bearing) ===================== -->
  <rect x="318" y="80" width="250" height="162" rx="7" fill="#f4f5f7" stroke="#16181d" stroke-width="1.3"/>
  <text x="443" y="104" font-size="14" font-weight="bold" fill="#16181d" text-anchor="middle">replayed as carrier mechanisms</text>
  <text x="443" y="121" font-size="11.5" fill="#8a9098" text-anchor="middle">the delivery structure, not the payload</text>
  <line x1="338" y1="132" x2="548" y2="132" stroke="#d8dade" stroke-width="0.8"/>
  <text x="338" y="152" font-size="12" fill="#16181d">· toward a neutral objective</text>
  <text x="338" y="171" font-size="12" fill="#16181d">· in a real deployment config</text>
  <text x="338" y="190" font-size="12" fill="#16181d">· against a frozen open-weight anchor</text>
  <text x="338" y="209" font-size="12" fill="#16181d">· judge calibrated to under-count</text>
  <text x="443" y="231" font-size="11" font-style="italic" fill="#8a9098" text-anchor="middle">so reproductions are lower bounds</text>

  <line x1="572" y1="161" x2="622" y2="161" stroke="#8a9098" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ===================== STAGE 3: the payoff (climax) ===================== -->
  <rect x="628" y="86" width="368" height="150" rx="7" fill="#fcf0f2" stroke="#c2354d" stroke-width="1"/>
  <text x="812" y="110" font-size="13" fill="#8a1f33" text-anchor="middle">of the 17 techniques claiming ~100% success</text>
  <text x="812" y="166" font-size="46" font-weight="bold" fill="#c2354d" text-anchor="middle">7 reproduce</text>
  <text x="812" y="196" font-size="15" fill="#8a1f33" text-anchor="middle">and those seven deliver a</text>
  <text x="812" y="220" font-size="20" font-weight="bold" fill="#c2354d" text-anchor="middle">mean breach rate of 13%</text>

  <!-- ===================== DIVIDER + COLLAPSE TABLE ===================== -->
  <line x1="44" y1="262" x2="996" y2="262" stroke="#d8dade" stroke-width="0.8"/>
  <text x="44" y="285" font-size="13" fill="#16181d">Reproduction falls an order of magnitude as the target hardens, and grey-literature techniques fall faster than paper-sourced ones:</text>

  <!-- column headers -->
  <text x="430" y="312" font-size="12" fill="#8a9098" text-anchor="middle">works on &#8805;1 of 5 panel models</text>
  <text x="650" y="312" font-size="12" fill="#8a9098" text-anchor="middle">frozen open-weight anchor</text>
  <text x="872" y="312" font-size="12" fill="#8a9098" text-anchor="middle">most robust model</text>

  <!-- arXiv row -->
  <text x="44" y="340" font-size="14" font-weight="bold" fill="#2f6df6">arXiv-sourced</text>
  <text x="430" y="343" font-size="22" font-weight="bold" fill="#2f6df6" text-anchor="middle">51.9%</text>
  <text x="650" y="343" font-size="22" font-weight="bold" fill="#2f6df6" text-anchor="middle">13.9%</text>
  <text x="872" y="343" font-size="22" font-weight="bold" fill="#2f6df6" text-anchor="middle">8.9%</text>

  <!-- grey-lit row -->
  <text x="44" y="372" font-size="14" font-weight="bold" fill="#e0803a">grey-lit</text>
  <text x="430" y="375" font-size="22" font-weight="bold" fill="#e0803a" text-anchor="middle">36.5%</text>
  <text x="650" y="375" font-size="22" font-weight="bold" fill="#e0803a" text-anchor="middle">7.2%</text>
  <text x="872" y="375" font-size="22" font-weight="bold" fill="#e0803a" text-anchor="middle">1.8%</text>

  <!-- footer note -->
  <text x="44" y="394" font-size="11" fill="#8a9098" font-style="italic">Pooled 40.5% &#8594; 9.0% &#8594; 3.7%. Spearman between claimed and measured rate is &#961; = &#8722;0.10 (95% CI [&#8722;0.37, +0.17], n = 56): no usable signal. The ~5&#215; source gap on hard targets is consistent and growing.</text>
</svg>
