# Render Blueprint for the ROGUE platform — deploy from the PRIVATE repo (rogue-private).
#
# BOTH services are DOCKER. ROGUE runs ONLY from its Dockerfiles (uvicorn / ASGI). If Render ever
# shows `gunicorn your_application.wsgi` → `command not found` (exit 127), the service was misdetected
# as a *Python* runtime — fix it by setting the service Runtime to **Docker** (this blueprint does that
# explicitly via `runtime: docker`). See docs/platform/deployment.md.
#
# Adopt-vs-duplicate: a Blueprint matches existing services by `name`. `rogue-api` below is named to
# ADOPT the existing API service (flip it to Docker). If Render instead creates a duplicate, rename or
# point the existing service's Runtime to Docker manually rather than via blueprint.

services:
  # API: serves the new /v1 routes + the legacy read-only /api. It ENQUEUES scans (never runs them).
  - type: web
    name: rogue-api
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/livez
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JUDGE_MODEL
        value: openai/gpt-5.4-nano

  # Scan worker: leases scan_jobs and executes them through the engine.
  # ⚠️ Render background WORKERS ARE PAID (no free tier, ~$7/mo). For a $0 launch, run the worker
  # IN-PROCESS inside the web service instead of deploying this — see docs/platform/deployment.md.
  - type: worker
    name: rogue-worker
    runtime: docker
    dockerfilePath: ./docker/worker.Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JUDGE_MODEL
        value: openai/gpt-5.4-nano
