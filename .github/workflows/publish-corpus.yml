# Regenerate the public attack corpus from an ALREADY-HARVESTED snapshot and commit it.
#
# MANUAL ONLY (workflow_dispatch) — there is deliberately NO `schedule:` cron.
# Per CLAUDE.md, ROGUE's costly / live-DB scripts must never run on a timer, and we are
# NOT auto-publishing yet. This workflow stays manual pending owner sign-off, and a human
# triggers it from the Actions tab once a publish is approved.
#
# IMPORTANT: this job runs the EXPORT only — `export_public_corpus.py` reads an
# already-harvested matrix (a committed snapshot fixture by default, or a read-only
# $DATABASE_URL) and projects the derived, redacted corpus. It must NEVER trigger a new
# harvest or any paid Bright Data / reproduction run. The export applies the redaction
# policy in RESPONSIBLE_RELEASE.md (raw scraped corpus is never published).

name: Publish attack corpus

on:
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Path to an already-harvested snapshot fixture (.json/.json.gz). Leave as the sample to do a dry run."
        required: true
        default: "scripts/corpus/sample_snapshot.json"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Regenerate corpus (export only — never harvests)
        run: |
          uv run python scripts/corpus/export_public_corpus.py \
            --snapshot "${{ github.event.inputs.snapshot }}"

      - name: Commit regenerated corpus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corpus/
          if git diff --cached --quiet; then
            echo "No corpus changes to commit."
          else
            git commit -m "chore(corpus): regenerate public attack corpus"
            git push
          fi
