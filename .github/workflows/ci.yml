name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: rogue
          POSTGRES_PASSWORD: rogue_dev_password
          POSTGRES_DB: rogue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rogue -d rogue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://rogue:rogue_dev_password@localhost:5432/rogue

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=rogue_dev_password psql -h localhost -U rogue -d rogue -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Type check (pyright, non-blocking)
        run: uvx pyright || true

      - name: Tests (pytest)
        run: uv run pytest -q

      - name: Independence lint (ADR-0011 exit gate)
        run: uv run python -m rogue.oversight.independence_lint

  frontend:
    name: frontend (lint + typecheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit
